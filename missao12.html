<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnGG | Missão 12: O Treinador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@700&family=VT323&display=swap');

        :root {
            --bg-base: #020205; --bg-panel: #0a0b10; --accent-primary: #00ffcc; 
            --accent-glow: rgba(0, 255, 204, 0.4); --text-main: #e2e8f0; 
            --border-color: #1e293b;
        }

        body { 
            background-color: var(--bg-base); color: var(--text-main); 
            font-family: 'Fira Code', monospace; margin: 0; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            overflow: hidden; background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, transparent 80%); 
        }

        #intro-cut-scene {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1s;
        }

        #dice-wrapper {
            width: 300px; height: 300px; position: relative;
        }

        .dice-half {
            width: 300px; height: 150px; overflow: hidden; position: absolute; left: 0;
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1), filter 1s;
            filter: grayscale(100%);
        }

        #dice-top { 
            top: 0; transform-origin: bottom center; 
            transform: translate(-30px, -40px) rotate(-10deg);
        }
        #dice-bottom { 
            bottom: 0; transform-origin: top center; 
            transform: translate(30px, 40px) rotate(10deg);
        }

        .dice-svg {
            width: 300px; height: 300px; position: absolute; left: 0;
            stroke: #fff; fill: rgba(0, 255, 204, 0.05); stroke-width: 2; stroke-linejoin: round;
            transition: stroke 1s;
        }

        #dice-top .dice-svg { top: 0; }
        #dice-bottom .dice-svg { top: -150px; }

        .healing-light {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 0px; height: 0px; background: #00ffcc; border-radius: 50%;
            box-shadow: 0 0 50px #00ffcc, 0 0 100px #00ffcc; opacity: 0; z-index: 10001;
            transition: width 0.5s, height 0.5s, opacity 0.5s;
        }

        .quest-container { 
            width: 100%; max-width: 1000px; background: var(--bg-panel); 
            border: 1px solid var(--border-color); border-radius: 12px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.9); display: grid; 
            grid-template-columns: 1fr 1fr; position: relative; z-index: 10; 
            opacity: 0; transform: scale(0.95); transition: opacity 1s, transform 1s;
        }

        .quest-header { 
            grid-column: 1 / -1; background: #000; padding: 20px 30px; 
            border-bottom: 1px solid var(--accent-primary); display: flex; 
            justify-content: space-between; align-items: center; 
        }

        .quest-title { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--accent-primary); margin: 0; text-transform: uppercase; }

        .lore-panel { padding: 30px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; }

        .boss-eyes { width: 180px; height: 80px; margin-bottom: 30px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        .dialogue-box { 
            background: rgba(0, 255, 204, 0.05); border: 1px solid var(--accent-primary); 
            padding: 20px; border-radius: 8px; font-family: 'VT323', monospace; 
            font-size: 1.5rem; line-height: 1.4; color: #a6fff2; min-height: 150px; width: 100%; box-sizing: border-box;
        }

        .action-panel { padding: 30px; display: flex; flex-direction: column; }

        .code-block { background: #000; padding: 15px; border-radius: 4px; border-left: 3px solid #00ffcc; color: #a6fff2; margin-bottom: 15px; font-size: 0.9rem; }

        .fake-terminal { background: #000; border-radius: 4px; border: 1px solid #1e293b; margin-top: auto; display: flex; flex-direction: column;}
        .terminal-header { background: #1e293b; padding: 5px 15px; font-size: 0.7rem; color: #94a3b8; display: flex; gap: 5px; }
        .terminal-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff5f56; }
        
        .terminal-body { padding: 15px; display: flex; align-items: flex-start; flex-grow: 1; }
        .terminal-body span { color: var(--accent-primary); margin-right: 10px; font-weight: bold; margin-top: 2px; }
        
        textarea { 
            background: transparent; border: none; color: #fff; 
            font-family: 'Fira Code', monospace; width: 100%; outline: none; 
            font-size: 1rem; resize: none; height: 80px; line-height: 1.5; pointer-events: none;
        }
        textarea::-webkit-scrollbar { width: 5px; }
        textarea::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; }

        .btn-cast { 
            background: transparent; color: var(--accent-primary); border: 1px solid var(--accent-primary); 
            padding: 15px; width: 100%; border-radius: 4px; font-family: 'Orbitron', sans-serif; 
            cursor: pointer; transition: 0.3s; margin-top: 15px; text-transform: uppercase; font-weight: bold; pointer-events: none; opacity: 0.5;
        }
        .btn-cast:hover { background: var(--accent-primary); color: #000; box-shadow: 0 0 20px var(--accent-glow); }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); } }

        #feedback-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: flex; justify-content: center; 
            align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; 
        }
        .modal-content { background: #0a0b10; border: 1px solid #00ffcc; padding: 40px; border-radius: 8px; text-align: center; max-width: 400px; }
        #feedback-modal.active { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

    <div id="intro-cut-scene">
        <div id="dice-wrapper">
            <div class="dice-half" id="dice-top">
                <svg viewBox="0 0 100 100" class="dice-svg">
                    <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" />
                    <polygon points="25,35 75,35 50,65" />
                    <line x1="50" y1="5" x2="25" y2="35"/><line x1="50" y1="5" x2="75" y2="35"/>
                    <line x1="10" y1="28" x2="25" y2="35"/><line x1="90" y1="28" x2="75" y2="35"/>
                    <line x1="10" y1="72" x2="25" y2="35"/><line x1="10" y1="72" x2="50" y2="65"/>
                    <line x1="90" y1="72" x2="75" y2="35"/><line x1="90" y1="72" x2="50" y2="65"/>
                    <line x1="50" y1="95" x2="50" y2="65"/>
                </svg>
            </div>
            <div class="dice-half" id="dice-bottom">
                <svg viewBox="0 0 100 100" class="dice-svg">
                    <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" />
                    <polygon points="25,35 75,35 50,65" />
                    <line x1="50" y1="5" x2="25" y2="35"/><line x1="50" y1="5" x2="75" y2="35"/>
                    <line x1="10" y1="28" x2="25" y2="35"/><line x1="90" y1="28" x2="75" y2="35"/>
                    <line x1="10" y1="72" x2="25" y2="35"/><line x1="10" y1="72" x2="50" y2="65"/>
                    <line x1="90" y1="72" x2="75" y2="35"/><line x1="90" y1="72" x2="50" y2="65"/>
                    <line x1="50" y1="95" x2="50" y2="65"/>
                </svg>
            </div>
            <div class="healing-light" id="heal"></div>
        </div>
    </div>

    <div class="quest-container" id="main-ui">
        <div class="quest-header">
            <h1 class="quest-title"><i class="fas fa-graduation-cap"></i> Missão 12: O Treinador</h1>
            <div style="color: var(--accent-primary); font-weight: bold;">+500 XP</div>
        </div>

        <div class="lore-panel">
            <svg class="boss-eyes" viewBox="0 0 200 80">
                <path d="M 10 70 L 90 70 L 80 20 Z" fill="#fff" stroke="#000" stroke-width="6" stroke-linejoin="round"/>
                <circle cx="65" cy="55" r="14" fill="#ff1a1a" stroke="#000" stroke-width="3"/>
                <circle cx="65" cy="55" r="5" fill="#000"/>
                <path d="M 190 70 L 110 70 L 120 20 Z" fill="#fff" stroke="#000" stroke-width="6" stroke-linejoin="round"/>
                <circle cx="135" cy="55" r="14" fill="#ff1a1a" stroke="#000" stroke-width="3"/>
                <circle cx="135" cy="55" r="5" fill="#000"/>
            </svg>
            <div class="dialogue-box" id="boss-text"></div>
        </div>

        <div class="action-panel">
            <div class="code-block" id="lesson-block" style="display: none; opacity: 0; transition: opacity 1s;">
                void Curar() {<br>
                &nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine("HP Restaurado");<br>
                }<br>
            </div>

            <div class="fake-terminal" id="terminal-box">
                <div class="terminal-header"><div class="terminal-dot"></div><span>functions.cs</span></div>
                <div class="terminal-body">
                    <span>></span>
                    <textarea id="answer" autocomplete="off" spellcheck="false" placeholder="Aguardando instruções..."></textarea>
                </div>
            </div>
            <button class="btn-cast" id="submit-btn" onclick="checkAnswer()">Compilar Chamada</button>
        </div>
    </div>

    <div id="feedback-modal">
        <div class="modal-content">
            <h2 style="color: var(--accent-primary); font-family: 'Orbitron', sans-serif;">Método Invocado!</h2>
            <p style="color: #e2e8f0; font-family: 'Fira Code', monospace; margin: 20px 0;">Organização é a chave para sistemas maiores. O Treinador está orgulhoso.</p>
            <button class="btn-cast" style="border-color: var(--accent-primary); color: var(--accent-primary); pointer-events: all; opacity: 1;" onclick="window.location.href='missao13.html'">Avançar ➔</button>
        </div>
    </div>

    <script>
        const answerBox = document.getElementById('answer');
        const submitBtn = document.getElementById('submit-btn');

        const trainerDialogue = "Ufa! Ahahaha! Acalme-se, programador! Eu não era um boss, sou apenas o seu Treinador. Se olhar bem de perto, os meus olhos nem são tão ameaçadores... são só dois círculos SVG perfeitamente inofensivos! Mas parabéns, você passou no teste de stresse de código. Agora, vamos organizar a casa aprendendo Métodos. Invoque o método Curar().";

        window.onload = () => {
            setTimeout(() => {
                const top = document.getElementById('dice-top');
                const bot = document.getElementById('dice-bottom');
                const heal = document.getElementById('heal');
                
                heal.style.opacity = '1';
                heal.style.width = '20px';
                heal.style.height = '20px';

                top.style.transform = 'translate(0px, 0px) rotate(0deg)';
                bot.style.transform = 'translate(0px, 0px) rotate(0deg)';
                
                setTimeout(() => {
                    heal.style.width = '400px';
                    heal.style.height = '400px';
                    
                    top.style.filter = 'grayscale(0%) drop-shadow(0 0 20px rgba(0, 255, 204, 0.4))';
                    bot.style.filter = 'grayscale(0%) drop-shadow(0 0 20px rgba(0, 255, 204, 0.4))';
                    
                    top.querySelector('.dice-svg').style.stroke = '#00ffcc';
                    bot.querySelector('.dice-svg').style.stroke = '#00ffcc';

                    setTimeout(() => {
                        const intro = document.getElementById('intro-cut-scene');
                        intro.style.opacity = '0';
                        intro.style.pointerEvents = 'none';
                        
                        const ui = document.getElementById('main-ui');
                        ui.style.opacity = '1';
                        ui.style.transform = 'scale(1)';
                        
                        typeDialogue(trainerDialogue, () => {
                            const lesson = document.getElementById('lesson-block');
                            lesson.style.display = 'block';
                            setTimeout(() => lesson.style.opacity = '1', 50);
                            
                            answerBox.placeholder = "Chame o método Curar()";
                            enableInput();
                        });
                    }, 800);
                }, 800);
            }, 1000);
        };

        function typeDialogue(text, callback) {
            const box = document.getElementById('boss-text');
            box.innerHTML = '';
            let i = 0;
            const speed = 35;
            
            function type() {
                if (i < text.length) {
                    box.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if(callback) {
                    callback();
                }
            }
            type();
        }

        function enableInput() {
            answerBox.style.pointerEvents = 'all';
            submitBtn.style.pointerEvents = 'all';
            submitBtn.style.opacity = '1';
            answerBox.focus();
        }

        function checkAnswer() {
            const ans = answerBox.value.replace(/\s+/g, '');
            const term = document.getElementById('terminal-box');

            if (ans === 'Curar();') {
                document.getElementById('feedback-modal').classList.add('active');
            } else {
                term.classList.add('shake');
                setTimeout(() => term.classList.remove('shake'), 400);
            }
        }

        answerBox.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); 
                checkAnswer(); 
            }
        });
    </script>
</body>
</html>
