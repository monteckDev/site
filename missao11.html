<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnGG | Missão 11: O Primeiro Boss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@700&family=VT323&display=swap');

        :root {
            --bg-base: #020205; --bg-panel: #0a0b10; --accent-primary: #ff1a1a; 
            --accent-glow: rgba(255, 26, 26, 0.4); --text-main: #e2e8f0; 
            --border-color: #3f0000;
        }

        body { 
            background-color: var(--bg-base); color: var(--text-main); 
            font-family: 'Fira Code', monospace; margin: 0; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            overflow: hidden; background-image: radial-gradient(circle at 50% 50%, #1a0000 0%, transparent 80%); 
        }

        #intro-cut-scene {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1s;
        }

        #dice-wrapper {
            width: 300px; height: 300px; position: relative;
            animation: spin-intro 1s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        @keyframes spin-intro {
            0% { transform: scale(0.1) rotate(-1080deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .dice-half {
            width: 300px; height: 150px; overflow: hidden; position: absolute; left: 0;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.6s;
            filter: drop-shadow(0 0 20px rgba(0, 255, 204, 0.4));
        }

        #dice-top { top: 0; transform-origin: bottom center; }
        #dice-bottom { bottom: 0; transform-origin: top center; }

        .dice-svg {
            width: 300px; height: 300px; position: absolute; left: 0;
            stroke: #00ffcc; fill: rgba(0, 255, 204, 0.05); stroke-width: 2; stroke-linejoin: round;
            transition: stroke 0.6s, fill 0.6s;
        }

        #dice-top .dice-svg { top: 0; }
        #dice-bottom .dice-svg { top: -150px; }

        .slash-line {
            position: absolute; top: 50%; left: 0; width: 0%; height: 3px;
            background: #fff; z-index: 10001; transform: translateY(-50%) rotate(-10deg);
            box-shadow: 0 0 20px #fff, 0 0 40px #fff; opacity: 0;
        }

        .quest-container { 
            width: 100%; max-width: 1000px; background: var(--bg-panel); 
            border: 1px solid var(--border-color); border-radius: 12px; 
            box-shadow: 0 0 50px rgba(255,0,0,0.15); display: grid; 
            grid-template-columns: 1fr 1fr; position: relative; z-index: 10; 
            opacity: 0; transform: scale(0.95); transition: opacity 1s, transform 1s;
        }

        .quest-header { 
            grid-column: 1 / -1; background: #1a0000; padding: 20px 30px; 
            border-bottom: 1px solid var(--accent-primary); display: flex; 
            justify-content: space-between; align-items: center; 
        }

        .quest-title { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--accent-primary); margin: 0; text-transform: uppercase; }

        .lore-panel { padding: 30px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; }

        .boss-eyes { width: 180px; height: 80px; margin-bottom: 30px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        .dialogue-box { 
            background: rgba(255, 26, 26, 0.05); border: 1px solid var(--accent-primary); 
            padding: 20px; border-radius: 8px; font-family: 'VT323', monospace; 
            font-size: 1.5rem; line-height: 1.4; color: #ff9999; min-height: 150px; width: 100%; box-sizing: border-box;
        }

        .action-panel { padding: 30px; display: flex; flex-direction: column; }

        .fake-terminal { background: #000; border-radius: 4px; border: 1px solid #660000; margin-top: auto; display: flex; flex-direction: column;}
        .terminal-header { background: #260000; padding: 5px 15px; font-size: 0.7rem; color: #ff6666; display: flex; gap: 5px; }
        .terminal-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff1a1a; }
        
        .terminal-body { padding: 15px; display: flex; align-items: flex-start; flex-grow: 1; }
        .terminal-body span { color: var(--accent-primary); margin-right: 10px; font-weight: bold; margin-top: 2px; }
        
        textarea { 
            background: transparent; border: none; color: #fff; 
            font-family: 'Fira Code', monospace; width: 100%; outline: none; 
            font-size: 1rem; resize: none; height: 120px; line-height: 1.5; pointer-events: none;
        }
        textarea::-webkit-scrollbar { width: 5px; }
        textarea::-webkit-scrollbar-thumb { background: #3f0000; border-radius: 5px; }

        .btn-cast { 
            background: #1a0000; color: var(--accent-primary); border: 1px solid var(--accent-primary); 
            padding: 15px; width: 100%; border-radius: 4px; font-family: 'Orbitron', sans-serif; 
            cursor: pointer; transition: 0.3s; margin-top: 15px; text-transform: uppercase; font-weight: bold; pointer-events: none; opacity: 0.5;
        }
        .btn-cast:hover { background: var(--accent-primary); color: #000; box-shadow: 0 0 20px var(--accent-glow); }

        #help-btn {
            display: none; background: transparent; color: #ff9999; border: 1px dashed #ff3333; 
            padding: 10px; width: 100%; border-radius: 4px; font-family: 'Orbitron', sans-serif; 
            cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; font-size: 0.8rem;
        }
        #help-btn:hover { background: rgba(255,51,51,0.1); box-shadow: inset 0 0 10px rgba(255,51,51,0.5); }

        #hint-visual { display: none; margin-top: 15px; text-align: center; animation: fadeIn 0.5s; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #feedback-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: flex; justify-content: center; 
            align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; 
        }
        .modal-content { background: #0a0b10; border: 1px solid #00ffcc; padding: 40px; border-radius: 8px; text-align: center; max-width: 400px; }
        #feedback-modal.active { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

    <div id="intro-cut-scene">
        <div id="dice-wrapper">
            <div class="dice-half" id="dice-top">
                <svg viewBox="0 0 100 100" class="dice-svg">
                    <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" />
                    <polygon points="25,35 75,35 50,65" />
                    <line x1="50" y1="5" x2="25" y2="35"/><line x1="50" y1="5" x2="75" y2="35"/>
                    <line x1="10" y1="28" x2="25" y2="35"/><line x1="90" y1="28" x2="75" y2="35"/>
                    <line x1="10" y1="72" x2="25" y2="35"/><line x1="10" y1="72" x2="50" y2="65"/>
                    <line x1="90" y1="72" x2="75" y2="35"/><line x1="90" y1="72" x2="50" y2="65"/>
                    <line x1="50" y1="95" x2="50" y2="65"/>
                </svg>
            </div>
            <div class="dice-half" id="dice-bottom">
                <svg viewBox="0 0 100 100" class="dice-svg">
                    <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" />
                    <polygon points="25,35 75,35 50,65" />
                    <line x1="50" y1="5" x2="25" y2="35"/><line x1="50" y1="5" x2="75" y2="35"/>
                    <line x1="10" y1="28" x2="25" y2="35"/><line x1="90" y1="28" x2="75" y2="35"/>
                    <line x1="10" y1="72" x2="25" y2="35"/><line x1="10" y1="72" x2="50" y2="65"/>
                    <line x1="90" y1="72" x2="75" y2="35"/><line x1="90" y1="72" x2="50" y2="65"/>
                    <line x1="50" y1="95" x2="50" y2="65"/>
                </svg>
            </div>
            <div class="slash-line" id="slash"></div>
        </div>
    </div>

    <div class="quest-container" id="main-ui">
        <div class="quest-header">
            <h1 class="quest-title"><i class="fas fa-biohazard"></i> Missão 11: O Primeiro Boss</h1>
            <div style="color: var(--accent-primary); font-weight: bold;">??? XP</div>
        </div>

        <div class="lore-panel">
            <svg class="boss-eyes" viewBox="0 0 200 80">
                <path d="M 10 70 L 90 70 L 80 20 Z" fill="#fff" stroke="#000" stroke-width="6" stroke-linejoin="round"/>
                <circle cx="65" cy="55" r="14" fill="#ff1a1a" stroke="#000" stroke-width="3"/>
                <circle cx="65" cy="55" r="5" fill="#000"/>
                <path d="M 190 70 L 110 70 L 120 20 Z" fill="#fff" stroke="#000" stroke-width="6" stroke-linejoin="round"/>
                <circle cx="135" cy="55" r="14" fill="#ff1a1a" stroke="#000" stroke-width="3"/>
                <circle cx="135" cy="55" r="5" fill="#000"/>
            </svg>
            <div class="dialogue-box" id="boss-text"></div>
        </div>

        <div class="action-panel">
            <div class="fake-terminal" id="terminal-box">
                <div class="terminal-header"><div class="terminal-dot"></div><span>boss_encounter.cs</span></div>
                <div class="terminal-body">
                    <span>></span>
                    <textarea id="answer" autocomplete="off" spellcheck="false"></textarea>
                </div>
            </div>
            <button class="btn-cast" id="submit-btn" onclick="checkAnswer()">Executar</button>
            <button id="help-btn" onclick="showHelp()"><i class="fas fa-hand-sparkles"></i> Clamar por Ajuda</button>
            <div id="hint-visual"></div>
        </div>
    </div>

    <div id="feedback-modal">
        <div class="modal-content">
            <h2 style="color: #00ffcc; font-family: 'Orbitron', sans-serif;">Ameaça Neutralizada</h2>
            <p style="color: #e2e8f0; font-family: 'Fira Code', monospace; margin: 20px 0;">O sistema foi restabelecido.</p>
            <button class="btn-cast" style="border-color: #00ffcc; color: #00ffcc; pointer-events: all; opacity: 1;" onclick="window.location.href='missao12.html'">Avançar ➔</button>
        </div>
    </div>

    <script>
        let currentState = 0;
        let failCount = 0;
        const answerBox = document.getElementById('answer');
        const submitBtn = document.getElementById('submit-btn');

        const bossDialogues = [
            "Ahahahaha, então... você colou ou olhou o prompt feito do lado não é? Deu para verificar no meu eye-tracking... Desta vez não terá como colar!",
            "Agora me diga como irá me atacar? Crie uma string onde o nome precisa ser atacar e o valor é dano.",
            "Você me pegou, porém preciso de mais rapidez. Crie uma variável int onde o nome é resultado e o valor é a conta de 512 - 124."
        ];

        window.onload = () => {
            setTimeout(() => {
                const slash = document.getElementById('slash');
                slash.style.opacity = '1';
                slash.style.width = '100%';
                slash.style.transition = 'width 0.2s';
                
                setTimeout(() => {
                    slash.style.opacity = '0';
                    const top = document.getElementById('dice-top');
                    const bot = document.getElementById('dice-bottom');
                    
                    top.style.filter = 'grayscale(100%)';
                    bot.style.filter = 'grayscale(100%)';
                    
                    top.querySelector('.dice-svg').style.stroke = '#fff';
                    bot.querySelector('.dice-svg').style.stroke = '#fff';

                    top.style.transform = 'translate(-30px, -40px) rotate(-10deg)';
                    bot.style.transform = 'translate(30px, 40px) rotate(10deg)';

                    setTimeout(() => {
                        const intro = document.getElementById('intro-cut-scene');
                        intro.style.opacity = '0';
                        intro.style.pointerEvents = 'none';
                        
                        const ui = document.getElementById('main-ui');
                        ui.style.opacity = '1';
                        ui.style.transform = 'scale(1)';
                        
                        typeDialogue(bossDialogues[0], () => {
                            setTimeout(() => {
                                typeDialogue(bossDialogues[1], () => {
                                    currentState = 1;
                                    enableInput();
                                });
                            }, 3000);
                        });
                    }, 1200);
                }, 200);
            }, 1200);
        };

        function typeDialogue(text, callback) {
            const box = document.getElementById('boss-text');
            box.innerHTML = '';
            let i = 0;
            const speed = 40;
            
            function type() {
                if (i < text.length) {
                    box.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if(callback) {
                    callback();
                }
            }
            type();
        }

        function enableInput() {
            answerBox.style.pointerEvents = 'all';
            submitBtn.style.pointerEvents = 'all';
            submitBtn.style.opacity = '1';
            answerBox.focus();
        }

        function disableInput() {
            answerBox.style.pointerEvents = 'none';
            submitBtn.style.pointerEvents = 'none';
            submitBtn.style.opacity = '0.5';
            answerBox.value = '';
            failCount = 0;
            document.getElementById('help-btn').style.display = 'none';
            document.getElementById('hint-visual').style.display = 'none';
        }

        function showHelp() {
            document.getElementById('help-btn').style.display = 'none';
            const visual = document.getElementById('hint-visual');
            visual.style.display = 'block';
            
            const hintText = currentState === 1 ? 'Tipo: string | Nome: atacar | Valor: "dano"' : 'Tipo: int | Nome: resultado | Valor: (Calcule!)';
            
            visual.innerHTML = `
                <svg viewBox="0 0 300 60" style="width:100%; max-height:60px; filter:drop-shadow(0 0 8px rgba(255,26,26,0.8));">
                    <rect x="20" y="35" width="20" height="6" fill="#660000"/>
                    <rect x="35" y="25" width="6" height="26" fill="#ff1a1a"/>
                    <polygon points="41,35 280,35 295,38 280,41 41,41" fill="#fff"/>
                    <text x="160" y="22" fill="#ff1a1a" font-family="Fira Code" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1">${hintText}</text>
                </svg>
            `;
        }

        function triggerFail() {
            const term = document.getElementById('terminal-box');
            term.classList.add('shake');
            setTimeout(() => term.classList.remove('shake'), 400);
            failCount++;
            if (failCount >= 2) {
                document.getElementById('help-btn').style.display = 'block';
            }
        }

        function checkAnswer() {
            const ans = answerBox.value.replace(/\s+/g, '');

            if (currentState === 1) {
                if (ans === 'stringatacar="dano";') {
                    disableInput();
                    typeDialogue(bossDialogues[2], () => {
                        currentState = 2;
                        enableInput();
                    });
                } else {
                    triggerFail();
                }
            } else if (currentState === 2) {
                if (ans === 'intresultado=388;') {
                    document.getElementById('feedback-modal').classList.add('active');
                } else {
                    triggerFail();
                }
            }
        }

        answerBox.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); 
                if (currentState > 0) checkAnswer(); 
            }
        });
    </script>
</body>
</html>
